# Prometheus Configuration
prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        memory: 400Mi
        cpu: 200m
      limits:
        memory: 800Mi
        cpu: 500m

# Grafana Configuration
grafana:
  enabled: true
  adminPassword: admin
  service:
    type: NodePort
    nodePort: 30080
  persistence:
    enabled: false

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://kube-prometheus-stack-prometheus.monitoring:9090
        access: proxy
        isDefault: false

# AlertManager Configuration
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 200Mi
        cpu: 100m
      limits:
        memory: 400Mi
        cpu: 200m

nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: true
