# Prometheus Configuration
prometheus:
  prometheusSpec:
    # Retention period for metrics
    retention: 7d
    # Storage size
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    # Resource limits
    resources:
      requests:
        memory: 400Mi
        cpu: 200m
      limits:
        memory: 800Mi
        cpu: 500m

# Grafana Configuration
grafana:
  enabled: true
  adminPassword: admin
  service:
    type: NodePort
    nodePort: 30080
  persistence:
    enabled: true
    size: 1Gi
  
  # Pre-configure data source
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-kube-prometheus-prometheus.monitoring:9090
        access: proxy
        isDefault: true

# AlertManager Configuration
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 200Mi
        cpu: 100m
      limits:
        memory: 400Mi
        cpu: 200m

# Node Exporter (collects system metrics)
nodeExporter:
  enabled: true

# Kube State Metrics (K8s object metrics)
kubeStateMetrics:
  enabled: true